# Netlify config for StopBack.
# config.js is gitignored, so the build generates it from environment
# variables set in the Netlify UI (Site configuration -> Environment
# variables): SUPABASE_URL and SUPABASE_ANON_KEY (the publishable key —
# safe to expose in the browser; row-level security protects the data).
[build]
  publish = "."
  command = "echo \"window.STOPBACK_CONFIG = { url: '$SUPABASE_URL', anonKey: '$SUPABASE_ANON_KEY' };\" > config.js"
